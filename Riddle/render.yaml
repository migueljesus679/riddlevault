services:
  - type: web
    name: riddlevault
    env: node
    rootDir: Riddle
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://riddlevault.onrender.com
    healthCheckPath: /api/health
