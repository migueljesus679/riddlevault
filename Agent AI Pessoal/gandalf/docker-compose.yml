services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gandalf
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gandalf-network

  api-node:
    build:
      context: ./backend-node
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      - ./backend-node:/app
      - /app/node_modules
      - ./shared:/shared
      - file_storage:/app/storage
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gandalf-network

  api-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend-python:/app
      - file_storage:/app/storage
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gandalf-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      api-node:
        condition: service_healthy
    networks:
      - gandalf-network

volumes:
  mongo_data:
  file_storage:

networks:
  gandalf-network:
    driver: bridge
